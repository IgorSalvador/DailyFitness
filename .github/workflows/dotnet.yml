name: .NET API CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DailyFitness.Api/DailyFitness.Api.csproj

      - name: Build
        run: dotnet build DailyFitness.Api/DailyFitness.Api.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test DailyFitness.sln --no-build --configuration Release --verbosity normal

      - name: Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish DailyFitness.Api/DailyFitness.Api.csproj --no-build --configuration Release --output ./publish

      - name: Upload publish artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dailyfitness-api-publish
          path: src/backend/publish
