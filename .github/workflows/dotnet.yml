name: .NET API CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  API_PROJECT_PATH: src/backend/DailyFitness.Api/DailyFitness.Api.csproj
  API_WORKING_DIRECTORY: src/backend/DailyFitness.Api
  PUBLISH_OUTPUT: ./publish

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore API
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build API
        run: dotnet build ${{ env.API_PROJECT_PATH }} --no-restore --configuration Release

      - name: Test solution
        run: dotnet test src/backend/DailyFitness.sln --no-build --configuration Release --verbosity normal

      - name: Publish API
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --no-build --configuration Release --output ${{ env.PUBLISH_OUTPUT }}

      - name: Upload publish artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dailyfitness-api-publish
          path: ${{ env.PUBLISH_OUTPUT }}
